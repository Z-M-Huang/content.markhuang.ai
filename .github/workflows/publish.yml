# Compile MDX articles (shiki pre-highlighting), upload to R2, and trigger ISR revalidation.
#
# Runs on every push to main. Compiles only changed articles for efficiency,
# but always uploads the full manifest. After R2 upload, triggers ISR revalidation
# and notifies the backend of newly added articles for auto-newsletter.
#
# Required secrets:
#   R2_ACCOUNT_ID         — Cloudflare account ID
#   R2_ACCESS_KEY_ID      — R2 API token key ID
#   R2_SECRET_ACCESS_KEY  — R2 API token secret
#   R2_BUCKET_NAME        — R2 bucket name (e.g. "content-markhuang-ai")
#   HOOK_BEARER_TOKEN     — Bearer token for backend hook endpoints
#   SITE_URL              — Production site URL (e.g. "https://markhuang.ai")

name: Publish Content

on:
  push:
    branches: [main]
    paths:
      - "blog/**"
      - "knowledge/**"

concurrency:
  group: publish-content
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2 # Need parent commit to detect changed files

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect changed articles
        id: changes
        run: |
          # Get changed MDX files and manifest
          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'blog/**/*.mdx' 'blog/manifest.json')

          if [ -z "$CHANGED" ]; then
            echo "No blog content changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Extract slugs from changed MDX files (filename without .mdx extension)
          SLUGS=""
          while IFS= read -r file; do
            if [[ "$file" == *.mdx ]]; then
              slug=$(basename "$file" .mdx)
              SLUGS="$SLUGS $slug"
            fi
          done <<< "$CHANGED"

          # If only manifest.json changed (no MDX), compile all
          if [ -z "$SLUGS" ]; then
            echo "compile_mode=all" >> "$GITHUB_OUTPUT"
          else
            echo "compile_mode=changed" >> "$GITHUB_OUTPUT"
            echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"
          fi

          # Detect newly added MDX files for auto-newsletter
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'blog/**/*.mdx')
          ADDED_SLUGS=""
          while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              slug=$(basename "$file" .mdx)
              ADDED_SLUGS="$ADDED_SLUGS $slug"
            fi
          done <<< "$ADDED"
          echo "added_slugs=$ADDED_SLUGS" >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          echo "$CHANGED"
          echo "Slugs to compile: $SLUGS"
          echo "Newly added slugs: $ADDED_SLUGS"

      - name: Compile articles
        if: steps.changes.outputs.has_changes == 'true'
        env:
          COMPILE_MODE: ${{ steps.changes.outputs.compile_mode }}
          SLUGS: ${{ steps.changes.outputs.slugs }}
        run: |
          if [ "$COMPILE_MODE" = "changed" ]; then
            bun run compile:changed $SLUGS
          else
            bun run compile
          fi

      - name: Upload to R2
        if: steps.changes.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # Upload articles first, then manifest — avoids a window where
          # the manifest references slugs whose MDX hasn't landed yet.
          for file in dist/articles/*.mdx; do
            [ -f "$file" ] || continue
            slug=$(basename "$file")
            npx wrangler r2 object put "${BUCKET}/articles/${slug}" \
              --file "$file" \
              --content-type "text/mdx"
          done

          # Upload manifest last
          npx wrangler r2 object put "${BUCKET}/manifest.json" \
            --file dist/manifest.json \
            --content-type "application/json"

          echo "Uploaded to R2 bucket: ${BUCKET}"

      - name: Trigger ISR revalidation
        if: steps.changes.outputs.has_changes == 'true'
        env:
          HOOK_TOKEN: ${{ secrets.HOOK_BEARER_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SITE_URL}/api/v1/hooks/revalidate" \
            -H "Authorization: Bearer ${HOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            --max-time 30)

          echo "ISR revalidation response: ${STATUS}"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::ISR revalidation returned ${STATUS}"
          fi

      - name: Notify backend of new articles
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.added_slugs != ''
        env:
          HOOK_TOKEN: ${{ secrets.HOOK_BEARER_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          ADDED_SLUGS: ${{ steps.changes.outputs.added_slugs }}
        run: |
          # Build JSON array of added slugs
          SLUGS_JSON=$(echo "$ADDED_SLUGS" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s .)

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SITE_URL}/api/v1/hooks/content-published" \
            -H "Authorization: Bearer ${HOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"added_slugs\": ${SLUGS_JSON}}" \
            --max-time 30)

          echo "Content-published hook response: ${STATUS}"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Content-published hook returned ${STATUS}"
          fi
